services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/chatapp
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env.docker
    environment:
      VITE_API_URL: http://server:5000
      USE_SEPARATE_BACKEND: "true"
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo-data:
