services:
  mongo:
    image: mongo:7
    container_name: chatapp-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: chatapp-server
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/chatapp
      - CLIENT_URL=http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: chatapp-client
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:5000
      - USE_SEPARATE_BACKEND=true
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo-data:
